services:
  - type: web
    name: study-planner
    runtime: node
    plan: free
    autoDeployTrigger: off
    buildCommand: npm install && npm --prefix client install && npm --prefix client run build && npm --prefix server install
    startCommand: node server/src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        fromDatabase:
          name: study-planner-db
          property: connectionString
      - key: CLIENT_ORIGIN
        value: https://study-planner.onrender.com

databases:
  - name: study-planner-db
    plan: free
    databaseName: planner
    user: planner
