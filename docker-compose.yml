services:
  db:
    image: postgres:16-alpine
    container_name: planner-db
    environment:
      POSTGRES_DB: planner
      POSTGRES_USER: planner
      POSTGRES_PASSWORD: plannerpass
    volumes:
      - planner-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planner -d planner"]
      interval: 5s
      timeout: 5s
      retries: 8

  server:
    build: ./server
    container_name: planner-server
    environment:
      PORT: 4000
      DATABASE_URL: postgres://planner:plannerpass@db:5432/planner
      CLIENT_ORIGIN: http://localhost:8080
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"

  client:
    build:
      context: ./client
      args:
        VITE_API_BASE_URL: /api
    container_name: planner-client
    depends_on:
      - server

  nginx:
    image: nginx:1.27-alpine
    container_name: planner-nginx
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - client
      - server
    ports:
      - "8080:80"

volumes:
  planner-data:
