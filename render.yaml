services:
  - type: web
    name: study-planner-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        fromDatabase:
          name: study-planner-db
          property: connectionString
      - key: CLIENT_ORIGIN
        sync: false

databases:
  - name: study-planner-db
    plan: free
    databaseName: planner
    user: planner
